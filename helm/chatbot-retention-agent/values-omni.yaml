# Default values for initiative-fe-service.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 2

image:
  repository:
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag:

imagePullSecrets:
  - name: reg-creds
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 8080
  targetport: 3000

ingress:
  enabled: true
  annotations:
    cert-manager.io/acme-challenge-type: dns01
    cert-manager.io/acme-dns01-provider: gcp-clouddns-provider
    cert-manager.io/cluster-issuer: letsencrypt-production-dns
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "PUT, GET, POST, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "access-control-allow-origin,Content-Type,Authorization"
    nginx.ingress.kubernetes.io/cors-expose-headers: "access-control-allow-origin,Authorization"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    #nginx.ingress.kubernetes.io/cors-allow-origin: "*.pscloudhub.com"
    nginx.ingress.kubernetes.io/configuration-snippet: "more_clear_headers \"x-envoy-decorator-operation\" \"x-envoy-upstream-service-time\";   \n"


  hosts:
    - host: psinnersource.lioncloud.net
      paths:
      - path: "/"
        backend:
          serviceName: inner-source-next-omni
          servicePort: 8080
  # tls: []
  #   - secretName: psa-tls-secret
  #      hosts:
  #      - psinnersource.lioncloud.net

resources:
  limits:
    cpu: 1000m
    memory: 1000Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 90
  targetMemoryUtilizationPercentage: 90


nodeSelector: {}

tolerations: []

affinity: {}
